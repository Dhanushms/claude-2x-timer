<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 2x Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p: #0F766E;
            --ph: #0D9488;
            --bg: #FFFFFF;
            --s: #F8FAFC;
            --t1: #0F172A;
            --t2: #334155;
            --acc: #0EA5E9;
            --bor: #E2E8F0;
            --rad: 16px;
            --sh: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] {
            --p: #14B8A6;
            --ph: #2DD4BF;
            --bg: #020617;
            --s: #0F172A;
            --t1: #F8FAFC;
            --t2: #CBD5E1;
            --bor: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--t1);
            transition: background 0.3s, color 0.3s;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .hero {
            text-align: center;
            margin-bottom: 48px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--p), var(--acc));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .promo-banner {
            background: rgba(15, 118, 110, 0.1);
            border: 1px solid var(--p);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
            color: var(--p);
            font-weight: 600;
        }

        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--s);
            border: 1px solid var(--bor);
            padding: 24px;
            border-radius: var(--rad);
            box-shadow: var(--sh);
            position: relative;
            overflow: hidden;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
            gap: 6px;
        }

        .badge-live { background: rgba(16, 185, 129, 0.1); color: #10B981; }
        .badge-live::before { content: ""; width: 6px; height: 6px; background: #10B981; border-radius: 50%; }

        .badge-boost { background: rgba(14, 165, 233, 0.1); color: var(--acc); }

        h3 { font-size: 18px; margin-bottom: 4px; }
        .time-text { font-size: 15px; color: var(--t2); }

        .timeline {
            margin-top: 40px;
            padding-left: 20px;
            border-left: 2px solid var(--bor);
        }

        .item {
            position: relative;
            margin-bottom: 32px;
            padding-left: 24px;
        }

        .item::before {
            content: "";
            position: absolute;
            left: -33px;
            top: 6px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--bg);
            border: 3px solid var(--p);
        }

        .item.boost::before { border-color: var(--acc); }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 48px;
        }

        .btn {
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: transform 0.1s, opacity 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.98); }
        .btn-p { background: var(--p); color: white; }
        .btn-o { background: transparent; border: 1px solid var(--bor); color: var(--t1); }

        .footer {
            margin-top: 60px;
            text-align: center;
            font-size: 12px;
            color: var(--t2);
        }

        .theme-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--s);
            border: 1px solid var(--bor);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: var(--sh);
            z-index: 100;
        }

        .tz-selector {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        select {
            background: transparent;
            border: none;
            color: var(--p);
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            outline: none;
        }

        @media (max-width: 500px) {
            .card-grid, .btn-group { grid-template-columns: 1fr; }
            .container { padding: 40px 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <button class="theme-btn" id="tog" title="Toggle Theme">🌓</button>
    
    <div class="container">
        <header class="hero">
            <h1>Claude 2x Planner</h1>
            <p style="color: var(--t2);">Master your message limits with intelligent scheduling.</p>
        </header>

        <div id="promo" class="promo-banner" style="display: none;">
            🚀 Claude 2x Usage Boost Active (Spring Break Promo)
        </div>

        <div class="card-grid">
            <div class="card">
                <span class="badge badge-live">Live Now</span>
                <h3>Active Session</h3>
                <p id="c-reset" class="time-text">Calculating...</p>
            </div>
            <div class="card">
                <span class="badge" id="n-badge" style="background: rgba(14, 165, 233, 0.1); color: var(--acc);">Upcoming</span>
                <h3>Next Window</h3>
                <p id="n-start" class="time-text">Waiting...</p>
            </div>
        </div>

        <div class="timeline" id="tl"></div>

        <div class="btn-group">
            <button class="btn btn-p" id="abc">Add to Apple Calendar</button>
            <button class="btn btn-o" id="gbc">Google Calendar</button>
        </div>

        <div class="tz-selector">
            <span style="font-size: 12px; color: var(--t2);">Timezone:</span>
            <select id="tz-select"></select>
        </div>

        <footer class="footer">
            <p>Designed by <a href="https://bysomeone.com" style="color: var(--p); text-decoration: none; font-weight: 600;">Bysomeone</a></p>
        </footer>
    </div>

    <script>
        const b = document.body;
        const setT = (t) => {
            b.setAttribute('data-theme', t);
            localStorage.setItem('cl_t', t);
        };
        document.getElementById('tog').onclick = () => setT(b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        setT(localStorage.getItem('cl_t') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'));

        const tzSelect = document.getElementById('tz-select');
        const timezones = Intl.supportedValuesOf('timeZone');
        const currentTz = Intl.DateTimeFormat().resolvedOptions().timeZone;

        timezones.forEach(tz => {
            const opt = document.createElement('option');
            opt.value = tz;
            opt.textContent = tz.replace(/_/g, ' ');
            if (tz === currentTz) opt.selected = true;
            tzSelect.appendChild(opt);
        });

        tzSelect.onchange = () => up();

        function isBoost(date) {
            const startPromo = new Date('2026-03-13T00:00:00Z');
            const endPromo = new Date('2026-03-29T00:00:00Z');
            if (date < startPromo || date > endPromo) return false;

            const day = date.getUTCDay();
            if (day === 0 || day === 6) return true;

            const hour = date.getUTCHours();
            return !(hour >= 12 && hour < 18);
        }

        function up() {
            const selTz = tzSelect.value;
            const now = new Date();
            const start = new Date(now.toLocaleString('en-US', { timeZone: selTz }));
            start.setHours(0, 0, 0, 0);
            
            const wins = [];
            for(let i=0; i<=25; i+=5) {
                const d = new Date(start.getTime() + i*3600000);
                wins.push(d);
            }

            let cur = wins.find((w, i) => now >= w && now < (wins[i+1] || new Date(w.getTime()+5*3600000)));
            if(!cur) cur = wins[0];
            const nxt = new Date(cur.getTime() + 5*3600000);

            const fmt = (d) => d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', timeZone: selTz });
            
            document.getElementById('c-reset').textContent = 'Resets at ' + fmt(nxt);
            document.getElementById('n-start').textContent = 'Starts at ' + fmt(nxt);
            
            const promo = document.getElementById('promo');
            promo.style.display = isBoost(now) ? 'block' : 'none';

            let html = '';
            for(let i=0; i<4; i++) {
                const w = new Date(cur.getTime() + i*5*3600000);
                const boost = isBoost(w);
                html += `
                    <div class="item ${boost ? 'boost' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h4 style="font-size:14px; color:var(--t1)">Window ${i+1}</h4>
                            ${boost ? '<span class="badge badge-boost" style="margin:0; font-size:9px">2x Boost</span>' : ''}
                        </div>
                        <p style="font-size:13px; color:var(--t2)">${fmt(w)} — ${fmt(new Date(w.getTime()+5*3600000))}</p>
                    </div>
                `;
            }
            document.getElementById('tl').innerHTML = html;
        }

        up();
        setInterval(up, 30000);

        document.getElementById('abc').onclick = () => {
            const f = (d) => d.toISOString().replace(/-|:|\.\d+/g, '');
            const lines = [
                'BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//Claude//EN', 'BEGIN:VEVENT',
                'DTSTAMP:'+f(new Date()), 'DTSTART:'+f(new Date()), 'DTEND:'+f(new Date(Date.now()+18000000)),
                'SUMMARY:Claude 2x Reset', 'DESCRIPTION:Time to start a new Claude session!',
                'RRULE:FREQ=DAILY;UNTIL=20260329T235959Z', 'END:VEVENT', 'END:VCALENDAR'
            ];
            const blob = new Blob([lines.join('\r
')], {type:'text/calendar'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'claude.ics'; a.click();
        };

        document.getElementById('gbc').onclick = () => {
            const text = encodeURIComponent('Claude 2x Session Reset');
            window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=' + text, '_blank');
        };
    </script>
</body>
</html>
