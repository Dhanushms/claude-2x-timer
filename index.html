<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude 2x Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--p:#0F766E;--bg:#FFF;--s:#F8FAFC;--t1:#0F172A;--t2:#334155;--acc:#0EA5E9;--bor:#E2E8F0;--rad:16px}
[data-theme=dark]{--p:#14B8A6;--bg:#020617;--s:#0F172A;--t1:#F8FAFC;--t2:#CBD5E1;--bor:#334155}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);transition:.3s;line-height:1.6}
.container{max-width:500px;margin:0 auto;padding:60px 20px}
.hero{text-align:center;margin-bottom:40px}
h1{font-size:2.2rem;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,var(--p),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.promo{background:rgba(15,118,110,.1);border:1px solid var(--p);border-radius:12px;padding:12px;text-align:center;margin-bottom:30px;font-size:13px;color:var(--p);font-weight:600}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:30px}
.card{background:var(--s);border:1px solid var(--bor);padding:20px;border-radius:var(--rad)}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:10px}
.badge-live{background:rgba(16,185,129,.1);color:#10B981}
.badge-boost{background:rgba(14,165,233,.1);color:var(--acc)}
h3{font-size:16px;margin-bottom:4px}
.time-text{font-size:14px;color:var(--t2)}
.countdown{font-size:24px;font-weight:800;margin-top:8px;color:var(--p)}
.progress{width:100%;height:6px;background:var(--bor);border-radius:8px;margin-top:12px;overflow:hidden}
.progress-bar{height:100%;background:var(--p);transition:width .5s}
.timeline{margin-top:30px;padding-left:15px;border-left:2px solid var(--bor)}
.item{position:relative;margin-bottom:25px;padding-left:20px}
.item::before{content:"";position:absolute;left:-24px;top:6px;width:14px;height:14px;border-radius:50%;background:var(--bg);border:3px solid var(--p)}
.item.boost::before{border-color:var(--acc)}
.btn-group{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:40px}
.btn{padding:12px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;border:none;text-align:center;text-decoration:none}
.btn-p{background:var(--p);color:#fff}
.btn-o{background:transparent;border:1px solid var(--bor);color:var(--t1)}
.footer{margin-top:50px;text-align:center;font-size:11px;color:var(--t2)}
.theme-btn{position:fixed;top:20px;right:20px;width:40px;height:40px;border-radius:50%;background:var(--s);border:1px solid var(--bor);cursor:pointer;display:flex;align-items:center;justify-content:center}
.tz-selector{margin-top:20px;text-align:center;font-size:12px;color:var(--t2)}
select{background:transparent;border:none;color:var(--p);font-weight:600;cursor:pointer;outline:none}
@media(max-width:400px){.card-grid,.btn-group{grid-template-columns:1fr}}
</style>
</head>
<body>
<button class="theme-btn" id="tog">🌓</button>
<div class="container">
<header class="hero">
<h1>Claude 2x Planner</h1>
<p style="color:var(--t2);font-size:14px">Intelligent scheduling for message limits.</p>
</header>
<div id="promo" class="promo" style="display:none">🚀 2x Usage Boost Active</div>
<div class="card-grid">
<div class="card">
<span class="badge badge-live">Live</span>
<h3>Active Now</h3>
<p id="c-reset" class="time-text">Loading...</p>
<div class="countdown" id="countdown">--:--</div>
<div class="progress"><div class="progress-bar" id="progress"></div></div>
</div>
<div class="card">
<span class="badge" style="background:rgba(14,165,233,.1);color:var(--acc)">Next</span>
<h3>Upcoming</h3>
<p id="n-start" class="time-text">Waiting...</p>
</div>
</div>
<div class="timeline" id="tl"></div>
<div class="btn-group">
<button class="btn btn-p" id="abc">Apple Calendar</button>
<button class="btn btn-o" id="gbc">Google Calendar</button>
</div>
<div class="tz-selector">Timezone: <select id="tz-select"></select></div>
<footer class="footer">Designed by <a href="https://bysomeone.com" style="color:var(--p);text-decoration:none;font-weight:600">Bysomeone</a></footer>
</div>
<script>
const b=document.body;
const setT=t=>{b.setAttribute('data-theme',t);localStorage.setItem('cl_t',t)};
document.getElementById('tog').onclick=()=>setT(b.getAttribute('data-theme')==='dark'?'light':'dark');
setT(localStorage.getItem('cl_t')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));

const tzSelect=document.getElementById('tz-select');
const currentTz=Intl.DateTimeFormat().resolvedOptions().timeZone;
const zones=[currentTz,'UTC','Asia/Kolkata','America/Los_Angeles','America/New_York','Europe/London','Europe/Paris','Asia/Tokyo','Australia/Sydney'];
[...new Set(zones)].forEach(z=>{
const o=document.createElement('option');o.value=z;o.textContent=z.replace(/_/g,' ');
if(z===currentTz)o.selected=true;
tzSelect.appendChild(o);
});

function isBoost(d){
const s=new Date('2026-03-13T00:00:00Z'),e=new Date('2026-03-29T00:00:00Z');
if(d<s||d>e)return false;
const day=d.getUTCDay();
if(day===0||day===6)return true;
const h=d.getUTCHours();
return!(h>=12&&h<18);
}

function up(){
const now=new Date();
const h5=5*60*60*1000;
const nowMs=now.getTime();
const curWindow=Math.floor(nowMs/h5)*h5;
const nextWindow=curWindow+h5;
const remaining=nextWindow-nowMs;

const fmt=d=>new Date(d).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
const fmtSec=ms=>{const m=Math.floor(ms/60000);const s=Math.floor((ms%60000)/1000);return`${m}:${s<10?'0':''}${s}`};

document.getElementById('c-reset').textContent='Resets at '+fmt(nextWindow);
document.getElementById('n-start').textContent='Starts at '+fmt(nextWindow);
document.getElementById('countdown').textContent=fmtSec(remaining);
document.getElementById('progress').style.width=(100-remaining/h5*100)+'%';
document.getElementById('promo').style.display=isBoost(now)?'block':'none';

let h='';
for(let i=0;i<3;i++){
const w=nextWindow+(i-1)*h5;
const boost=isBoost(new Date(w));
h+=`<div class="item ${boost?'boost':''}">
<div style="display:flex;justify-content:space-between">
<h4 style="font-size:14px">Window ${i+1}</h4>
${boost?'<span class="badge badge-boost">2x Boost</span>':''}
</div>
<p class="time-text">${fmt(w)} – ${fmt(w+h5)}</p>
</div>`;
}
document.getElementById('tl').innerHTML=h;
}

up();tzSelect.onchange=up;setInterval(up,1000);

document.getElementById('abc').onclick=()=>{
const f=d=>d.toISOString().replace(/-|:|\.\d+/g,'');
const l=['BEGIN:VCALENDAR','VERSION:2.0','BEGIN:VEVENT','SUMMARY:Claude Reset','DTSTART:'+f(new Date()),'DTEND:'+f(new Date(Date.now()+3600000)),'RRULE:FREQ=DAILY;UNTIL=20260329T235959Z','END:VEVENT','END:VCALENDAR'];
const blob=new Blob([l.join('\r\n')],{type:'text/calendar'});
const u=URL.createObjectURL(blob);
const a=document.createElement('a');a.href=u;a.download='claude.ics';a.click();
};
document.getElementById('gbc').onclick=()=>window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=Claude+Reset','_blank');
</script>
</body>
</html>
