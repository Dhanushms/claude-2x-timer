<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 2x Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --border: #222222;
            --text-main: #eeeeee;
            --text-dim: #888888;
            --text-muted: #555555;
            --2x: #14b8a6;
            --2x-glow: rgba(20, 184, 166, 0.2);
            --1x: #f59e0b;
            --1x-glow: rgba(245, 158, 11, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; }
        h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 4px; color: var(--text-main); }
        .subtitle { font-size: 0.85rem; color: var(--text-dim); font-weight: 400; }

        .clock-section { text-align: center; }
        .clock { font-size: 4rem; font-weight: 700; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; margin-bottom: 8px; }

        .tz-picker {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-dim);
            cursor: pointer;
            position: relative;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tz-picker:hover { background: var(--card-bg); color: var(--text-main); }
        .tz-picker select {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; appearance: none;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 16px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .status-pill.two-x {
            background: var(--2x-glow);
            color: var(--2x);
            border: 1px solid rgba(20, 184, 166, 0.3);
            box-shadow: 0 0 20px var(--2x-glow);
            animation: pulse 2s infinite;
        }
        .status-pill.one-x {
            background: var(--1x-glow);
            color: var(--1x);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
            100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }

        .timeline-section { width: 100%; }
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }
        .bar-container {
            position: relative;
            height: 18px;
            border-radius: 9px;
            background: var(--card-bg);
            overflow: hidden;
            display: flex;
        }
        .seg { height: 100%; transition: width 0.3s; }
        .seg.green { background: var(--2x); opacity: 0.8; }
        .seg.red { background: var(--border); }

        .now-marker {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: #fff;
            z-index: 10;
            transition: left 0.5s linear;
        }
        .now-marker::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -3px;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
        }
        .card-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; }
        .countdown {
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .countdown.two-x { color: var(--2x); }
        .countdown.one-x { color: var(--1x); }
        .card-info { font-size: 0.85rem; color: var(--text-muted); }

        .upcoming-section { width: 100%; }
        .upcoming-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .upcoming-row {
            background: var(--bg);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        .row-left { display: flex; align-items: center; gap: 12px; color: var(--text-dim); }
        .row-day { font-weight: 500; color: var(--text-main); width: 80px; }
        .row-time { font-variant-numeric: tabular-nums; }
        .row-badge {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--2x-glow);
            color: var(--2x);
        }

        footer { margin-top: 32px; font-size: 0.7rem; color: var(--text-muted); text-align: center; }

        @media (max-width: 480px) {
            .clock { font-size: 3.2rem; }
            .countdown { font-size: 2.5rem; }
            .main-card { padding: 24px 16px; }
            .row-day { width: 65px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Claude 2x Planner</h1>
            <p class="subtitle">Know the best time to get more from Claude</p>
        </header>

        <div class="clock-section">
            <div class="clock" id="clock">--:--:--</div>
            <div class="tz-picker" id="tzPicker">
                <span>Show times for: <strong id="currentCity">Loading...</strong></span>
                <span style="font-size: 0.6rem; opacity: 0.5;">▼</span>
                <select id="tzSelect"></select>
            </div>
            <br>
            <div class="status-pill" id="statusPill">
                <span id="statusIcon">🕐</span>
                <span id="statusText">Checking...</span>
            </div>
        </div>

        <div class="timeline-section">
            <div class="timeline-header">
                <span>Timeline</span>
                <span id="timelineDay">Today</span>
            </div>
            <div class="bar-container" id="timelineBar">
                <div class="now-marker" id="nowMarker"></div>
            </div>
            <div class="timeline-labels">
                <span>12 AM</span>
                <span>6 AM</span>
                <span>12 PM</span>
                <span>6 PM</span>
                <span>12 AM</span>
            </div>
            <div id="boostRange" style="font-size: 0.7rem; color: var(--text-muted); text-align: center; margin-top: 12px;"></div>
        </div>

        <div class="main-card">
            <div class="card-label" id="cdLabel">Countdown</div>
            <div class="countdown" id="countdown">--:--:--</div>
            <div class="card-info" id="cdInfo">Calculating next window...</div>
        </div>

        <div class="upcoming-section">
            <div class="card-label" style="text-align: left; margin-left: 4px;">Next Boost Windows</div>
            <div class="upcoming-list" id="upcomingList"></div>
        </div>
    </div>

    <footer>
        Times auto-converted from PT & GMT rules · Made by Dhanush
    </footer>

    <script>
        const RULES = {
            is2x: (date) => {
                const day = date.getUTCDay(); // 0=Sun, 6=Sat
                if (day === 0 || day === 6) return true;
                const hours = date.getUTCHours();
                return hours >= 12 && hours < 18; // 12-18 UTC is 5:30-11:30 PM IST
            }
        };

        const ZONES = [
            { id: 'detected', name: '📍 Detected' },
            { id: 'America/Los_Angeles', name: 'San Francisco (PT)' },
            { id: 'America/New_York', name: 'New York (ET)' },
            { id: 'Europe/London', name: 'London (GMT)' },
            { id: 'Europe/Berlin', name: 'Berlin (CET)' },
            { id: 'Asia/Dubai', name: 'Dubai (GST)' },
            { id: 'Asia/Kolkata', name: 'Bangalore (IST)' },
            { id: 'Asia/Singapore', name: 'Singapore (SGT)' },
            { id: 'Asia/Tokyo', name: 'Tokyo (JST)' },
            { id: 'Australia/Sydney', name: 'Sydney (AEST)' }
        ];

        let currentTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const select = document.getElementById('tzSelect');

        ZONES.forEach(z => {
            const opt = document.createElement('option');
            opt.value = z.id === 'detected' ? Intl.DateTimeFormat().resolvedOptions().timeZone : z.id;
            opt.textContent = z.name;
            select.appendChild(opt);
        });
        select.value = currentTz;

        function updateCityLabel() {
            const zone = ZONES.find(z => (z.id === 'detected' && currentTz === Intl.DateTimeFormat().resolvedOptions().timeZone) || z.id === currentTz);
            document.getElementById('currentCity').textContent = zone ? zone.name.replace('📍 Detected', 'Local') : 'Custom';
        }

        select.onchange = (e) => {
            currentTz = e.target.value;
            updateCityLabel();
            renderTimeline();
            renderUpcoming();
            tick();
        };

        function getTzNow() {
            return new Date(new Date().toLocaleString("en-US", {timeZone: currentTz}));
        }

        function pad(n) { return String(n).padStart(2, '0'); }

        function renderTimeline() {
            const bar = document.getElementById('timelineBar');
            const marker = document.getElementById('nowMarker');
            bar.querySelectorAll('.seg').forEach(s => s.remove());

            const tzNow = getTzNow();
            const startOfDay = new Date(tzNow);
            startOfDay.setHours(0,0,0,0);

            let segments = [];
            for(let i=0; i<1440; i+=15) {
                const localT = new Date(startOfDay.getTime() + i * 60000);
                // Correct way to check UTC rules: 
                // We need to know what UTC time it IS when the local time is localT.
                // Since startOfDay is already "localized" to currentTz, 
                // we should calculate the UTC equivalent.
                const utcEquivalent = new Date(localT.toLocaleString("en-US", {timeZone: "UTC"}));
                
                // Wait, toLocaleString(UTC) gives a string. Let's do it properly:
                // The true UTC time for "localT" in "currentTz"
                const formatter = new Intl.DateTimeFormat('en-US', {
                    timeZone: currentTz,
                    year: 'numeric', month: 'numeric', day: 'numeric',
                    hour: 'numeric', minute: 'numeric', second: 'numeric',
                    hour12: false
                });
                
                // Actually, the simplest way: 
                // RULES.is2x checks UTC. We want to know if 'localT' (which is currentTz time) is 2x.
                // To do that, we need the REAL UTC time that corresponds to 'localT' in 'currentTz'.
                const parts = formatter.formatToParts(new Date()); // just to get current offset logic? No.
                
                // Better: 
                const testDate = new Date();
                const locStr = testDate.toLocaleString("en-US", {timeZone: currentTz});
                const locDate = new Date(locStr);
                const offset = testDate.getTime() - locDate.getTime();
                const realUtcTime = new Date(localT.getTime() + offset);

                const active = RULES.is2x(realUtcTime);
                if (segments.length > 0 && segments[segments.length-1].active === active) {
                    segments[segments.length-1].duration += 15;
                } else {
                    segments.push({ active, duration: 15 });
                }
            }

            segments.forEach(s => {
                const el = document.createElement('div');
                el.className = 'seg ' + (s.active ? 'green' : 'red');
                el.style.width = (s.duration / 1440 * 100) + '%';
                bar.appendChild(el);
            });
            bar.appendChild(marker);

            // Update boost range label in local time
            const isWeekend = tzNow.getDay() === 0 || tzNow.getDay() === 6;
            if (isWeekend) {
                document.getElementById('boostRange').textContent = "Full weekend boost active";
            } else {
                // 12-18 UTC to local
                const d1 = new Date(); d1.setUTCHours(12, 0, 0, 0);
                const d2 = new Date(); d2.setUTCHours(18, 0, 0, 0);
                const opt = { hour: 'numeric', minute: '2-digit' };
                const t1 = d1.toLocaleTimeString([], { ...opt, timeZone: currentTz });
                const t2 = d2.toLocaleTimeString([], { ...opt, timeZone: currentTz });
                document.getElementById('boostRange').textContent = `Weekday 2x: ${t1} – ${t2}`;
            }
        }

        function getNextWindows() {
            const list = [];
            let check = new Date();
            check.setMinutes(0,0,0);
            for(let i=0; i<168; i++) {
                const active = RULES.is2x(check);
                if (active) {
                    const start = new Date(check);
                    while(RULES.is2x(check)) check.setTime(check.getTime() + 3600000);
                    const end = new Date(check);
                    list.push({ start, end });
                    if (list.length >= 3) break;
                }
                check.setTime(check.getTime() + 3600000);
            }
            return list;
        }

        function tick() {
            const realNow = new Date();
            const tzNow = new Date(realNow.toLocaleString("en-US", {timeZone: currentTz}));
            
            document.getElementById('clock').textContent = tzNow.toLocaleTimeString('en-GB', { hour12: false });
            
            const active = RULES.is2x(realNow);
            const pill = document.getElementById('statusPill');
            const icon = document.getElementById('statusIcon');
            const txt = document.getElementById('statusText');

            if (active) {
                pill.className = 'status-pill two-x';
                icon.textContent = '⚡';
                txt.textContent = '2x Boosted — Claude is fast';
            } else {
                pill.className = 'status-pill one-x';
                icon.textContent = '🕐';
                txt.textContent = '1x Mode — Normal speed';
            }

            const mins = tzNow.getHours() * 60 + tzNow.getMinutes();
            document.getElementById('nowMarker').style.left = (mins / 1440 * 100) + '%';

            let target = new Date(realNow);
            if (active) {
                while(RULES.is2x(target)) target.setTime(target.getTime() + 1000);
                document.getElementById('cdLabel').textContent = "You're in the zone — 2x ends in";
                document.getElementById('countdown').className = "countdown two-x";
            } else {
                while(!RULES.is2x(target)) target.setTime(target.getTime() + 1000);
                document.getElementById('cdLabel').textContent = "Good time coming up — 2x in";
                document.getElementById('countdown').className = "countdown one-x";
            }

            const diff = Math.max(0, Math.floor((target - realNow) / 1000));
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;
            document.getElementById('countdown').textContent = pad(h) + ':' + pad(m) + ':' + pad(s);

            const tzTarget = new Date(target.toLocaleString("en-US", {timeZone: currentTz}));
            document.getElementById('cdInfo').textContent = (active ? 'Ends at ' : 'Starts at ') + tzTarget.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            // Re-render timeline if it's a new day or if forced
            if (tzNow.getMinutes() === 0 && tzNow.getSeconds() === 0) {
                renderTimeline();
            }
        }

        function renderUpcoming() {
            const windows = getNextWindows();
            const container = document.getElementById('upcomingList');
            container.innerHTML = '';
            windows.forEach((w, i) => {
                const s = new Date(w.start.toLocaleString("en-US", {timeZone: currentTz}));
                const e = new Date(w.end.toLocaleString("en-US", {timeZone: currentTz}));
                const row = document.createElement('div');
                row.className = 'upcoming-row';
                const dayName = s.toLocaleDateString([], {weekday: 'short'});
                const durationHrs = (e - s) / 3600000;
                let timeStr = s.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) + ' – ' + e.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
                if (durationHrs >= 24) timeStr = "Full Day Boost";
                
                row.innerHTML = `
                    <div class="row-left">
                        <div class="row-day">${dayName}</div>
                        <div class="row-time">${timeStr}</div>
                    </div>
                    ${i === 0 ? '<div class="row-badge">Next up</div>' : ''}
                `;
                container.appendChild(row);
            });
        }

        updateCityLabel();
        renderTimeline();
        renderUpcoming();
        tick();
        setInterval(tick, 1000);
        setInterval(renderUpcoming, 60000);
    </script>
</body>
</html>
