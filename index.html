<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude 2x Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F2F2F7; --card: #FFFFFF; --t1: #1C1C1E; --t2: #8E8E93;
      --p: #007AFF; --acc: #5856D6; --bor: rgba(0,0,0,0.05);
      --glass: rgba(255,255,255,0.7); --blur: saturate(180%) blur(20px);
    }
    [data-theme=dark] {
      --bg: #000000; --card: #1C1C1E; --t1: #FFFFFF; --t2: #8E8E93;
      --p: #0A84FF; --acc: #5E5CE6; --bor: rgba(255,255,255,0.1);
      --glass: rgba(28,28,30,0.7);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--t1); transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1); line-height: 1.5; overflow-x: hidden; }
    .container { max-width: 480px; margin: 0 auto; padding: 60px 24px; min-height: 100vh; }
    
    /* Apple Header Style */
    .header { text-align: center; margin-bottom: 40px; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    h1 { font-size: 34px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    .subtitle { color: var(--t2); font-size: 17px; font-weight: 500; }

    /* Live Card - Glassmorphism */
    .live-card {
      background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1.5px solid var(--bor); border-radius: 28px; padding: 32px; margin-bottom: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative; overflow: hidden;
      animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both;
    }
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
      background: rgba(48, 209, 88, 0.15); color: #30D158; border-radius: 100px;
      font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 20px;
    }
    .status-pill.off { background: rgba(142, 142, 147, 0.15); color: var(--t2); }
    
    .timer-display { font-size: 56px; font-weight: 800; letter-spacing: -2px; margin: 12px 0; font-variant-numeric: tabular-nums; }
    .timer-label { color: var(--t2); font-size: 15px; font-weight: 600; margin-bottom: 24px; }
    
    .progress-track { height: 8px; background: var(--bor); border-radius: 100px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--p); border-radius: 100px; transition: width 1s linear; }

    /* Modern Timeline */
    .section-label { font-size: 13px; font-weight: 700; color: var(--t2); text-transform: uppercase; letter-spacing: 1px; margin: 40px 0 20px; padding-left: 4px; }
    .timeline { display: flex; flex-direction: column; gap: 12px; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both; }
    .time-item {
      background: var(--card); border: 1.5px solid var(--bor); border-radius: 20px; padding: 18px 24px;
      display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease;
    }
    .time-item:hover { transform: scale(1.02); border-color: var(--p); }
    .time-info h4 { font-size: 17px; font-weight: 600; }
    .time-info p { font-size: 14px; color: var(--t2); font-weight: 500; }
    .boost-tag {
      background: linear-gradient(135deg, var(--p), var(--acc)); color: white;
      padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    }

    /* Action Buttons */
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 32px; animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s both; }
    .btn {
      height: 54px; border-radius: 16px; border: none; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: var(--t1); color: var(--bg); }
    .btn-secondary { background: var(--card); color: var(--t1); border: 1.5px solid var(--bor); }
    .btn:active { transform: scale(0.96); opacity: 0.8; }

    /* Footer Polished */
    .footer { margin-top: 60px; text-align: center; color: var(--t2); font-size: 13px; padding-bottom: 40px; line-height: 1.8; }
    .footer a { color: var(--t1); text-decoration: none; font-weight: 600; border-bottom: 1.5px solid transparent; transition: 0.2s; }
    .footer a:hover { border-bottom-color: var(--t1); }
    .tooltip { position: relative; display: inline-block; cursor: help; border-bottom: 1px dotted var(--t2); }
    .tooltip .tooltiptext {
      visibility: hidden; width: 200px; background: var(--t1); color: var(--bg); text-align: center;
      border-radius: 12px; padding: 10px; position: absolute; z-index: 1; bottom: 125%; left: 50%;
      margin-left: -100px; opacity: 0; transition: opacity 0.3s; font-size: 12px; font-weight: 500; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }

    /* Controls */
    .theme-toggle { position: fixed; top: 24px; right: 24px; width: 44px; height: 44px; border-radius: 100px; background: var(--glass); backdrop-filter: var(--blur); border: 1.5px solid var(--bor); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; transition: 0.3s; font-size: 20px; }
    .tz-select-wrap { margin-top: 24px; text-align: center; }
    #tz-select { background: transparent; border: none; color: var(--p); font-size: 13px; font-weight: 700; cursor: pointer; outline: none; padding: 4px 8px; border-radius: 8px; }
    #tz-select:hover { background: rgba(0,0,0,0.05); }

    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 480px) { h1 { font-size: 28px; } .timer-display { font-size: 48px; } .actions { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-theme="dark">
  <button class="theme-toggle" id="theme-btn" aria-label="Toggle Theme">🌓</button>
  
  <div class="container">
    <header class="header">
      <h1>Claude 2x Planner</h1>
      <p class="subtitle">Smart scheduling for power users.</p>
    </header>

    <div class="live-card">
      <div id="status-pill" class="status-pill">
        <span id="status-dot" style="width:8px;height:8px;background:currentColor;border-radius:50%"></span>
        <span id="status-text">Checking Boost...</span>
      </div>
      <div id="countdown" class="timer-display">00:00:00</div>
      <p id="timer-desc" class="timer-label">Loading schedule...</p>
      <div class="progress-track">
        <div id="progress" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="section-label">Upcoming Schedule</div>
    <div id="timeline" class="timeline">
      <!-- Generated by JS -->
    </div>

    <div class="actions">
      <button id="add-apple" class="btn btn-primary">Add to Calendar</button>
      <button id="add-google" class="btn btn-secondary">Google Calendar</button>
    </div>

    <div class="tz-select-wrap">
      <select id="tz-select"></select>
    </div>

    <footer class="footer">
      Made by <a href="https://bysomeone.com" target="_blank">Dhanush</a> &middot; 
      <span class="tooltip">Privacy-first
        <span class="tooltiptext">No data collection. No trackers. All calculations happen locally on your device.</span>
      </span> &middot; 
      All times auto-converted to your timezone
      <br><br>
      <a href="https://github.com/Dhanushms/claude-2x-timer" target="_blank" style="display:inline-flex;align-items:center;gap:4px">
        <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        GitHub
      </a>
    </footer>
  </div>

  <script>
    const b = document.body;
    const themeBtn = document.getElementById('theme-btn');
    const setT = t => { b.setAttribute('data-theme', t); localStorage.setItem('cl_t', t); };
    themeBtn.onclick = () => setT(b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    if (localStorage.getItem('cl_t')) setT(localStorage.getItem('cl_t'));

    const tzSelect = document.getElementById('tz-select');
    let selTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const zones = [selTz, 'Asia/Kolkata', 'UTC', 'America/New_York', 'Europe/London', 'Asia/Tokyo'];
    [...new Set(zones)].forEach(z => {
      const o = document.createElement('option'); o.value = z; o.textContent = z.replace(/_/g, ' ');
      if (z === selTz) o.selected = true; tzSelect.appendChild(o);
    });

    function getBoostStatus(date) {
      const istDate = new Date(date.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
      const day = istDate.getDay();
      const h = istDate.getHours();
      const m = istDate.getMinutes();
      const totalMins = h * 60 + m;

      const isWeekend = (day === 0 || day === 6);
      const start = 17 * 60 + 30; // 5:30 PM
      const end = 23 * 60 + 30;   // 11:30 PM
      
      const active = isWeekend || (totalMins >= start && totalMins < end);
      
      let next = new Date(istDate);
      if (isWeekend) {
        // Weekend is continuous, next change is Monday 5:30 PM IST (off-boost start)
        // For simplicity in UI, we check next day transition
        next.setHours(23, 59, 59, 999);
      } else {
        if (totalMins < start) next.setHours(17, 30, 0, 0);
        else if (totalMins < end) next.setHours(23, 30, 0, 0);
        else { next.setDate(next.getDate() + 1); next.setHours(17, 30, 0, 0); }
      }
      
      const istOffset = 330;
      const diff = (istOffset + date.getTimezoneOffset()) * 60000;
      return { active, next: new Date(next.getTime() - diff) };
    }

    function up() {
      const now = new Date();
      const s = getBoostStatus(now);
      const rem = s.next - now;

      const fmt = (d, z) => new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', timeZone: z });
      const fmtTimer = ms => {
        const h = Math.floor(ms / 3600000);
        const m = Math.floor((ms % 3600000) / 60000);
        const sec = Math.floor((ms % 60000) / 1000);
        return `${h}:${m < 10 ? '0' : ''}${m}:${sec < 10 ? '0' : ''}${sec}`;
      };

      document.getElementById('countdown').textContent = fmtTimer(rem);
      document.getElementById('status-pill').className = 'status-pill' + (s.active ? '' : ' off');
      document.getElementById('status-text').textContent = s.active ? '2x Boost Active' : 'Standard Limits';
      document.getElementById('timer-desc').textContent = s.active ? 'Ends at ' + fmt(s.next, selTz) : 'Boost starts at ' + fmt(s.next, selTz);
      
      // Progress calculation (6h boost window or 18h off window)
      const duration = s.active ? (6 * 3600000) : (18 * 3600000);
      document.getElementById('progress').style.width = Math.min(100, (1 - rem / duration) * 100) + '%';

      let h = '';
      for (let i = 0; i < 4; i++) {
        const t = new Date(now.getTime() + i * 6 * 3600000);
        const st = getBoostStatus(t);
        h += `
          <div class="time-item">
            <div class="time-info">
              <h4>${fmt(t, selTz)}</h4>
              <p>${st.active ? 'Increased Limits' : 'Standard Usage'}</p>
            </div>
            ${st.active ? '<span class="boost-tag">2X BOOST</span>' : ''}
          </div>
        `;
      }
      document.getElementById('timeline').innerHTML = h;
    }

    tzSelect.onchange = () => { selTz = tzSelect.value; up(); };
    setInterval(up, 1000); up();

    document.getElementById('add-apple').onclick = () => window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=Claude+2x+Boost','_blank');
    document.getElementById('add-google').onclick = () => window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=Claude+2x+Boost','_blank');
  </script>
</body>
</html>
