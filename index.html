<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude 2x Planner</title>
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ═══════════════════════════════════════════════════════════
       DESIGN SYSTEM - CSS VARIABLES
       ═══════════════════════════════════════════════════════════ */
    
    :root {
      /* Color System - Light Mode (WCAG AAA Compliant) */
      --color-primary: #0F766E;          /* Teal 700 */
      --color-primary-hover: #0D9488;    /* Teal 600 */
      --color-bg: #FFFFFF;
      --color-surface: #F8FAFC;          /* Slate 50 */
      --color-text-primary: #0F172A;     /* Slate 900 - 16.9:1 contrast */
      --color-text-secondary: #334155;   /* Slate 700 - 9.7:1 contrast */
      --color-success: #047857;          /* Emerald 700 */
      --color-border: #E2E8F0;           /* Slate 200 */
      --color-accent: #0EA5E9;           /* Sky 500 */
      --color-muted: #64748B;            /* Slate 500 */
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #0F766E 0%, #14B8A6 100%);
      
      /* 8pt Grid System */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      
      /* Border Radius */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;
      
      /* Box Shadows */
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      
      /* Typography Scale */
      --font-size-sm: 14px;
      --font-size-base: 16px;
      --font-size-lg: 18px;
      --font-size-xl: 24px;
      --font-size-2xl: 32px;
      
      /* Transitions */
      --transition-fast: 100ms ease;
      --transition-base: 200ms ease;
      --transition-slow: 300ms ease;
    }
    
    /* Dark Mode */
    [data-theme="dark"] {
      --color-primary: #14B8A6;          /* Teal 500 */
      --color-primary-hover: #2DD4BF;    /* Teal 400 */
      --color-bg: #020617;               /* Slate 950 */
      --color-surface: #0F172A;          /* Slate 900 */
      --color-text-primary: #F8FAFC;     /* Slate 50 - 17.3:1 contrast */
      --color-text-secondary: #CBD5E1;   /* Slate 300 - 10.4:1 contrast */
      --color-success: #10B981;          /* Emerald 500 */
      --color-border: #334155;           /* Slate 700 */
      --color-accent: #38BDF8;           /* Sky 400 */
      --color-muted: #94A3B8;            /* Slate 400 */
      
      --gradient-primary: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.2);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.15);
    }
    
    /* ═══════════════════════════════════════════════════════════
       BASE STYLES
       ═══════════════════════════════════════════════════════════ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: var(--font-size-base);
      line-height: 1.5;
      color: var(--color-text-primary);
      background: var(--color-bg);
      min-height: 100vh;
      transition: background-color var(--transition-slow), color var(--transition-slow);
    }
    
    /* Reduced Motion Support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    /* ═══════════════════════════════════════════════════════════
       TYPOGRAPHY
       ═══════════════════════════════════════════════════════════ */
    
    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
      line-height: 1.2;
      color: var(--color-text-primary);
    }
    
    h1 {
      font-size: var(--font-size-2xl);
    }
    
    h2 {
      font-size: var(--font-size-xl);
    }
    
    p {
      font-size: var(--font-size-base);
      font-weight: 400;
      line-height: 1.5;
      color: var(--color-text-secondary);
    }
    
    .text-sm {
      font-size: var(--font-size-sm);
    }
    
    .text-muted {
      color: var(--color-muted);
    }
    
    /* ═══════════════════════════════════════════════════════════
       LAYOUT
       ═══════════════════════════════════════════════════════════ */
    
    .container {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: var(--space-lg);
    }
    
    .header {
      text-align: center;
      margin-bottom: var(--space-2xl);
    }
    
    .section {
      margin-bottom: var(--space-2xl);
    }
    
    /* ═══════════════════════════════════════════════════════════
       DARK MODE TOGGLE
       ═══════════════════════════════════════════════════════════ */
    
    .theme-toggle {
      position: fixed;
      top: var(--space-lg);
      right: var(--space-lg);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: var(--space-sm) var(--space-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: var(--font-size-sm);
      color: var(--color-text-secondary);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-base);
      z-index: 1000;
    }
    
    .theme-toggle:hover {
      background: var(--color-primary);
      color: white;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .theme-toggle:active {
      transform: translateY(0);
    }
    
    .theme-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }
    
    /* Hide sun icon in light mode, moon in dark mode */
    [data-theme="light"] .icon-moon { display: inline-block; }
    [data-theme="light"] .icon-sun { display: none; }
    [data-theme="dark"] .icon-moon { display: none; }
    [data-theme="dark"] .icon-sun { display: inline-block; }
  </style>
</head>
<body>
  
  <!-- Dark Mode Toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <span class="theme-icon icon-moon">🌙</span>
    <span class="theme-icon icon-sun">☀️</span>
    <span id="themeLabel">Dark</span>
  </button>
  
  <div class="container">
    <header class="header">
      <h1>Claude 2x Planner</h1>
      <p>Plan your Claude sessions around 2x message windows</p>
    </header>
    
    <main>
      <section class="section">
        <h2>Phase 1a Complete</h2>
        <p>Design system, dark mode, and typography are now implemented.</p>
        <p class="text-sm text-muted">Next: Hero redesign + status badges + timezone detection</p>
      </section>
    </main>
  </div>
  
  <script>
    // ═══════════════════════════════════════════════════════════
    // DARK MODE FUNCTIONALITY
    // ═══════════════════════════════════════════════════════════
    
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const htmlElement = document.documentElement;
    
    // Check for saved theme preference or default to system preference
    function getPreferredTheme() {
      const savedTheme = localStorage.getItem('claude2x_theme');
      if (savedTheme) {
        return savedTheme;
      }
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    
    // Apply theme
    function setTheme(theme) {
      htmlElement.setAttribute('data-theme', theme);
      localStorage.setItem('claude2x_theme', theme);
      themeLabel.textContent = theme === 'dark' ? 'Light' : 'Dark';
    }
    
    // Toggle theme
    function toggleTheme() {
      const currentTheme = htmlElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }
    
    // Initialize theme
    setTheme(getPreferredTheme());
    
    // Event listener
    themeToggle.addEventListener('click', toggleTheme);
    
    // Listen for system theme changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      if (!localStorage.getItem('claude2x_theme')) {
        setTheme(e.matches ? 'dark' : 'light');
      }
    });
    
    console.log('✅ Phase 1a Complete: Design System + Dark Mode + Typography');
  </script>
  
</body>
</html>
